services:
  - type: web
    name: b2c-react-xpress
    runtime: node
    region: oregon
    buildCommand: cd server && npm install
    startCommand: cd server && npx tsx index.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: ISSUER_BASE_URL
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: CLIENT_SECRET
        sync: false
      - key: BASE_URL
        sync: false
      - key: SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
